name: CI
on:
  push:
    branches:
      - master
      - main
      - 'release*'
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  pull_request:
  workflow_dispatch:

concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ github.event_name }}
    runs-on: ubuntu-latest
    permissions: # needed to allow julia-actions/cache to delete old caches that it has created
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        version:
          - 'min'
          - '1'
          - 'pre'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: julia-actions/setup-julia@4a12c5f801ca5ef0458bba44687563ef276522dd # v3.0.0
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@9a93c5fb3e9c1c20b60fc80a478cae53e38618a4 # v3.0.2
      - name: Resolve pre-release environment
        if: matrix.version == 'pre'
        shell: julia --project=@. --color=yes {0}
        # edit test/Project using TOML because of a Pkg.rm bug
        run: |
            using TOML
            test_project = "test/Project.toml"
            d = TOML.parsefile(test_project)
            delete!(d["deps"], "JET")
            delete!(d["compat"], "JET")
            open(test_project, "w") do io
                TOML.print(io, d)
            end
            using Pkg
            Pkg.update()
      - uses: julia-actions/julia-runtest@d60b785c6f2bdf4ebfb18b2b6f7d93b7dfb0efe3 # v1.11.4
      - uses: julia-actions/julia-processcoverage@03114f09f119417c3242a9fb6e0b722676aedf38 # v1.2.2
      - uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info

  Documenter:
    name: Documentation
    runs-on: ubuntu-latest
    needs: test
    permissions:
      actions: write  # Required when authenticating with `GITHUB_TOKEN`, not needed when authenticating with SSH deploy keys
      contents: write
      pull-requests: read  # Required when using `push_preview=true`
      statuses: write  # Optional, used to report documentation build statuses
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: julia-actions/setup-julia@4a12c5f801ca5ef0458bba44687563ef276522dd # v3.0.0
        with:
          version: '1'
          show-versioninfo: 'true'
      - uses: julia-actions/cache@9a93c5fb3e9c1c20b60fc80a478cae53e38618a4 # v3.0.2
      - name: Configure doc environment
        shell: julia --project=docs --color=yes {0}
        run: |
            using Pkg
            Pkg.Registry.update()
            Pkg.instantiate(;workspace=true)
      - name: Run doctests
        shell: julia --project=docs --color=yes {0}
        run: |
            using Documenter: DocMeta, doctest
            using Peaks
            DocMeta.setdocmeta!(Peaks, :DocTestSetup, :(using Peaks); recursive=true)
            doctest(Peaks)
      - uses: julia-actions/julia-docdeploy@e62cc8fd639797a0c2922a437d5b1b81c4a12787 # v1.3.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
